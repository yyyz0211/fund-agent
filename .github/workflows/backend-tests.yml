name: Backend tests

on:
  push:
    branches: [main, refactore]
  pull_request:

jobs:
  postgresql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: fund_agent_test
          POSTGRES_USER: fund_test
          POSTGRES_PASSWORD: fund_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fund_test -d fund_agent_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg2://fund_test:fund_test@127.0.0.1:5432/fund_agent_test
      TEST_DATABASE_URL: postgresql+psycopg2://fund_test:fund_test@127.0.0.1:5432/fund_agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest -q backend/tests -m unit
      - name: Run ordinary tests with isolated worker schemas
        run: >-
          python -m pytest -q backend/tests -n 2
          -m "not unit and not db_multiconnection and not db_ddl and not db_pgvector"
      - name: Run multi-connection tests serially
        run: python -m pytest -q backend/tests -n 0 -m db_multiconnection
      - name: Run DDL and pgvector tests serially
        run: python -m pytest -q backend/tests -n 0 -m "db_ddl or db_pgvector"
      - name: Compile backend
        run: python -m compileall -q backend

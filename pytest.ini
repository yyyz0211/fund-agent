[pytest]
markers =
    pgvector: requires a disposable pgvector-enabled PostgreSQL database
    unit: no external dependencies, all I/O mocked
    integration: requires real DB or external services
    slow: execution time > 5s
    db: tests using the PostgreSQL transactional fixture (`db_session`)
    db_multiconnection: tests using real independent connections (must commit and TRUNCATE)
    db_ddl: tests performing schema migrations or pgvector DDL, run serially in CI
    db_pgvector: tests that need the `vector` extension

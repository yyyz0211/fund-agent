# Alembic configuration for Fund Agent
# PostgreSQL is the only supported database

[alembic]
# path to migration scripts
script_location = %(here)s/db/alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# path separator
path_separator = os

# output encoding used when revision files are written
output_encoding = utf-8

# database URL - MUST be PostgreSQL, read from DATABASE_URL env var
# sqlalchemy.url is configured in env.py to read from DATABASE_URL

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
